version: "3.9"
services:
  gdp-app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "8010:8010"
      - "8011:8011"
      - "8501:8501"
    volumes:
      - ./src:/app/src          # live reload
      - ./data:/app/data
      - ./logs:/app/logs
      - ./reports:/app/reports
    environment:
      - CORE_API_URL=http://localhost:8010
      - ANALYTICS_API_URL=http://localhost:8011
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
      - STREAMLIT_SERVER_PORT=8501
    restart: unless-stopped